<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Infinite Canvas - Eraser Support</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f0f0f0;
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
        }

        /*画布样式*/
        canvas {
            display: block;
            background: white;
            touch-action: none;
            cursor: crosshair; /*  让鼠标变为十字准星，将来该材质可能在这改*/
        }
        /*工具栏样式*/
        #toolbar {
            position: fixed;
            right: 20px; /*距离右边 20px*/
            top: 50%; /*垂直居中*/
            transform: translateY(-50%);
            background: rgba(255,255,255,0.95);
            padding: 14px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: sans-serif;
            user-select: none;
            <div id="toolbar">
    <button id="clearBtn" style="margin-top: 10px; padding: 8px; cursor: pointer; background: #ff4d4d; color: white; border: none; border-radius: 6px;">
        清空画布 🗑️
    </button>
</div>
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="toolbar">
        <label>模式:</label>
        <select id="toolSelect">
            <option value="brush">画笔 🖌️</option>
            <option value="eraser">橡皮 🧽</option>
        </select>

        <label>颜色:</label>
        <input type="color" id="colorPicker" value="#000000">

        <label>粗细:</label>
        <input type="range" id="sizeSlider" min="1" max="50" value="2">

        <hr>
        <small style="color: #666">右键: 平移画布</small>
        <button id="clearBtn" style="margin-top: 10px; padding: 8px; cursor: pointer; background: #ff4d4d; color: white; border: none; border-radius: 6px;">
            清空画布 🗑️
        </button>
        <button id="undoBtn" style="padding: 8px; cursor: pointer;">撤销 ↩️</button>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        let strokes = [];
        let currentStroke = null;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;

        let currentColor = "#000000";
        let currentSize = 2;
        let currentTool = "brush"; // 【记录当前选择的工具】
        let mouseScreenX = 0; // 记录鼠标在屏幕上的原始X
        let mouseScreenY = 0; // 记录鼠标在屏幕上的原始Y


        // 1. 适配屏幕大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener("resize", resize);

        // 2. 工具栏监听
        document.getElementById("colorPicker").oninput = (e) => currentColor = e.target.value;
        document.getElementById("sizeSlider").oninput = (e) => currentSize = parseInt(e.target.value);
        document.getElementById("toolSelect").onchange = (e) => {
            currentTool = e.target.value;
            canvas.style.cursor = (currentTool === "eraser") ? "none" : "crosshair";
        };
        // 监听清空按钮
        document.getElementById("clearBtn").onclick = () => {
            // 弹出确认框（可选，防止误点）
            if (confirm("确定要清空所有笔记吗？")) {
                strokes = []; // 1. 清空存储所有笔迹的数组
                draw();       // 2. 重新调用绘图函数（因为数组空了，clearRect 会清空整个屏幕）
            }
        };
        document.getElementById("undoBtn").onclick = () => {
            strokes.pop(); // 移除数组中最后一项（最后一笔）
            draw();        // 重新渲染
        };

        // 进阶：监听键盘 Ctrl+Z
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                strokes.pop();
                draw();
            }
        });


        // 3. 坐标转换
        function screenToWorld(x, y) {
            return {
                x: (x - offsetX) / scale,
                y: (y - offsetY) / scale
            };
        }

        // 4. 绘图引擎（合并修正版）
        function draw() {
            // 1. 重置坐标系并清空
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. 应用当前视图的平移和缩放
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            // 3. 【循环开始】只负责画历史笔迹
            strokes.forEach(stroke => {
                if (stroke.points.length < 2) return;

                ctx.beginPath();
                if (stroke.tool === "eraser") {
                    ctx.globalCompositeOperation = "destination-out";
                    ctx.lineWidth = stroke.size * 2;
                } else {
                    ctx.globalCompositeOperation = "source-over";
                    ctx.strokeStyle = stroke.color;
                    ctx.lineWidth = stroke.size;
                }

                ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                for (let i = 1; i < stroke.points.length; i++) {
                    ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                }
                ctx.stroke();

                // 每一笔画完重置模式
                ctx.globalCompositeOperation = "source-over";
            }); // <--- 【循环在这里结束】

            // 4. 【循环外面】单独处理橡皮擦预览圆
            if (currentTool === "eraser") {
                // 只有在这里重置坐标系才是安全的
                ctx.setTransform(1, 0, 0, 1, 0, 0);

                ctx.beginPath();
                // 半径直接用 currentSize 即可（对应上面 size * 2 的直径）
                ctx.arc(mouseScreenX, mouseScreenY, currentSize, 0, Math.PI * 2);

                ctx.strokeStyle = "rgba(0, 0, 0, 0.4)";
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // 5. 交互逻辑
        let isDrawing = false;
        let isPanning = false;
        let lastX = 0, lastY = 0;

        canvas.addEventListener("contextmenu", e => e.preventDefault());

        canvas.addEventListener("pointerdown", (e) => {
            canvas.setPointerCapture(e.pointerId);
            lastX = e.clientX;
            lastY = e.clientY;

            if (e.button === 2 || e.shiftKey) {
                isPanning = true;
            } else {
                isDrawing = true;
                const pos = screenToWorld(e.clientX, e.clientY);

                // 【核心：在创建每一笔时，把当前的工具 tool 存进去】
                currentStroke = {
                    points: [pos],
                    color: currentColor,
                    size: currentSize / scale,
                    tool: currentTool // 保存这一笔是画笔还是橡皮
                };
                strokes.push(currentStroke);
            }
        });

        canvas.addEventListener("pointermove", (e) => {
            mouseScreenX = e.clientX;
            mouseScreenY = e.clientY;

            if (isDrawing && currentStroke) {
                const pos = screenToWorld(e.clientX, e.clientY);
                currentStroke.points.push(pos);
                draw();
            } else if (isPanning) {
                offsetX += e.clientX - lastX;
                offsetY += e.clientY - lastY;
                draw();
            } else {
                if (currentTool === "eraser") draw();
            }

            lastX = e.clientX;
            lastY = e.clientY;
        });

        canvas.addEventListener("pointerup", (e) => {
            isDrawing = false;
            isPanning = false;
            currentStroke = null;
            canvas.releasePointerCapture(e.pointerId);
        });

        canvas.addEventListener("wheel", (e) => {
            e.preventDefault();
            const delta = -e.deltaY;
            const factor = Math.pow(1.1, delta / 100);

            scale *= factor;
            scale = Math.min(Math.max(0.1, scale), 10);

            draw();
        }, { passive: false });

        // 初始化调用
        resize();
    </script>
</body>
</html>
